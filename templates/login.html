<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Handoff Tracker</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: var(--sp-4);
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }

    .login-header {
      padding: var(--sp-8) var(--sp-6) var(--sp-4);
      text-align: center;
    }

    .login-brand {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      margin-bottom: var(--sp-4);
    }

    .login-brand .icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: var(--fs-lg);
      font-weight: 700;
    }

    .login-brand span {
      font-size: var(--fs-xl);
      font-weight: 700;
    }

    .login-subtitle {
      color: var(--text-secondary);
      font-size: var(--fs-sm);
    }

    .login-body {
      padding: var(--sp-4) var(--sp-6) var(--sp-6);
    }

    .login-error {
      display: none;
      background: var(--critical-bg);
      color: var(--critical);
      padding: var(--sp-2) var(--sp-3);
      border-radius: var(--radius);
      font-size: var(--fs-sm);
      margin-bottom: var(--sp-4);
      text-align: center;
    }

    .login-error.show { display: block; }

    .login-footer {
      padding: var(--sp-3) var(--sp-6);
      background: var(--surface);
      border-top: 1px solid var(--border-light);
      text-align: center;
      font-size: var(--fs-xs);
      color: var(--text-muted);
    }

    .demo-creds {
      margin-top: var(--sp-4);
      padding: var(--sp-3);
      background: var(--surface);
      border-radius: var(--radius);
      font-size: var(--fs-xs);
      color: var(--text-secondary);
    }

    .demo-creds strong {
      color: var(--text);
    }

    .demo-creds table {
      width: 100%;
      margin-top: var(--sp-2);
    }

    .demo-creds td {
      padding: 2px var(--sp-2);
      border: none;
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
    }

    .demo-creds tr { cursor: pointer; border-radius: var(--radius-sm); }
    .demo-creds tr:hover td { background: var(--primary-bg); }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="login-brand">
          <div class="icon">H</div>
          <span>Handoff</span>
        </div>
        <p class="login-subtitle">Patient Handoff Tracker for Emergency Medicine</p>
      </div>

      <div class="login-body">
        <div class="login-error" id="login-error"></div>

        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" class="form-input" id="username" name="username" autocomplete="username" autofocus required>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-input" id="password" name="password" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">Sign In</button>
        </form>

        <div class="demo-creds">
          <strong>Demo Credentials</strong> (click to autofill)
          <table>
            <tr onclick="fillDemo('achen','demo')"><td>achen</td><td>demo</td><td style="color:var(--text-muted);">Attending</td></tr>
            <tr onclick="fillDemo('rpatel','demo')"><td>rpatel</td><td>demo</td><td style="color:var(--text-muted);">Resident</td></tr>
            <tr onclick="fillDemo('mwilliams','demo')"><td>mwilliams</td><td>demo</td><td style="color:var(--text-muted);">Resident</td></tr>
            <tr onclick="fillDemo('jnurse','demo')"><td>jnurse</td><td>demo</td><td style="color:var(--text-muted);">Nurse</td></tr>
          </table>
        </div>
      </div>

      <div class="login-footer">
        I-PASS Handoff System &middot; QI Project &middot; All data is synthetic
      </div>
    </div>
  </div>

  <script>
    function fillDemo(user, pass) {
      document.getElementById('username').value = user;
      document.getElementById('password').value = pass;
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || 'Login failed');
        }

        window.location.href = '/board';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
