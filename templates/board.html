{% extends "base.html" %}
{% block title %}Patient Board — Handoff Tracker{% endblock %}
{% block styles %}
<link rel="stylesheet" href="/static/css/board.css">
{% endblock %}

{% block content %}
<!-- Shift bar -->
<div class="shift-bar">
  <div class="shift-info">
    <span class="shift-type">Night Shift</span>
    <span class="shift-time">19:00 — 07:00</span>
    <span style="color: var(--text-muted);">|</span>
    <span>ED Main</span>
  </div>
  <div style="display:flex; align-items:center; gap: var(--sp-3);">
    <div class="shift-team">
      <div class="team-avatar" title="Dr. Chen">AC</div>
      <div class="team-avatar" title="Dr. Patel">RP</div>
      <div class="team-avatar" title="Dr. Williams">MW</div>
    </div>
    <button class="btn btn-outline btn-sm">Manage Shift</button>
  </div>
</div>

<!-- Board header -->
<div class="board-header">
  <div>
    <h1 class="page-title">Patient Board</h1>
    <div class="board-stats" id="board-stats">
      <span>Loading...</span>
    </div>
  </div>
  <div style="display:flex; gap: var(--sp-2);">
    <button class="btn btn-primary">+ New Patient</button>
    <button class="btn btn-outline">Start Handoff</button>
  </div>
</div>

<!-- Filters -->
<div class="board-filters">
  <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">All</button>
  <button class="filter-chip" data-filter="critical" onclick="setFilter('critical')">Critical</button>
  <button class="filter-chip" data-filter="serious" onclick="setFilter('serious')">Serious</button>
  <button class="filter-chip" data-filter="stable" onclick="setFilter('stable')">Stable</button>
  <button class="filter-chip" data-filter="watch" onclick="setFilter('watch')">Watch</button>
  <span style="width: 1px; background: var(--border); margin: 0 var(--sp-1);"></span>
  <button class="filter-chip" data-filter="admit" onclick="setFilter('admit')">Admit</button>
  <button class="filter-chip" data-filter="discharge" onclick="setFilter('discharge')">Discharge</button>
  <button class="filter-chip" data-filter="undecided" onclick="setFilter('undecided')">Undecided</button>
</div>

<!-- Patient grid — populated by board.js from API -->
<div class="patient-grid" id="patient-grid">
  <div class="empty-state"><p>Loading patients...</p></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/api.js"></script>
<script src="/static/js/board.js"></script>
{% endblock %}
