<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Handoff Tracker{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  {% block styles %}{% endblock %}
</head>
<body>
  <nav class="nav no-print">
    <div class="nav-inner">
      <div class="nav-brand">
        <div class="icon">H</div>
        <span>Handoff</span>
      </div>
      <ul class="nav-links">
        <li><a href="/board" class="{% if active_page == 'board' %}active{% endif %}">Board</a></li>
        <li><a href="/shifts" class="{% if active_page == 'shifts' %}active{% endif %}">Shifts</a></li>
        <li><a href="/dashboard" class="{% if active_page == 'dashboard' %}active{% endif %}">Metrics</a></li>
      </ul>
      <div class="nav-user">
        <span class="sse-dot disconnected" id="sse-status" title="Real-time connection"></span>
        <span id="user-name">{{ user.display_name if user else 'Guest' }}</span>
        <button class="btn btn-ghost btn-sm" id="logout-btn" onclick="doLogout()">Logout</button>
      </div>
    </div>
  </nav>

  <main class="page">
    <div class="container">
      <div id="flash-container"></div>
      {% block content %}{% endblock %}
    </div>
  </main>

  <script>
    async function doLogout() {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
